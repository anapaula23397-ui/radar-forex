<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radar Forex</title>

<style>

body{
font-family:Arial;
background:#101010;
color:white;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:50%;
}

th,td{
border:1px solid #444;
padding:10px;
}

.compra{
color:#00ff88;
font-weight:bold;
}

.venda{
color:#ff4444;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Radar Forex</h1>

<table id="tabela">
<tr>
<th>PAR</th>
<th>SINAL</th>
</tr>
</table>

<script>

async function atualizar(){

let resposta = await fetch("/sinais")
let dados = await resposta.json()

let tabela = document.getElementById("tabela")

tabela.innerHTML = "<tr><th>PAR</th><th>SINAL</th></tr>"

dados.forEach(d => {

let classe = d.sinal == "COMPRA" ? "compra" : "venda"

tabela.innerHTML += `
<tr>
<td>${d.par}</td>
<td class="${classe}">${d.sinal}</td>
</tr>
`

})

}

setInterval(atualizar,10000)

atualizar()

</script>

</body>
</html>
